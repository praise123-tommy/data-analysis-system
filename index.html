<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Stat-Engine | Pro v4.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .glass-ui { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        #lineCanvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .neo-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 12px; border-radius: 12px; outline: none; transition: 0.3s; }
        .neo-input:focus { border-color: #fff; background: rgba(255, 255, 255, 0.1); }
        .stat-card { border-left: 2px solid #fff; padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 8px; transition: 0.3s; }
        .stat-card:hover { background: rgba(255,255,255,0.08); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

<canvas id="lineCanvas"></canvas>

<div class="container-fluid max-w-7xl mx-auto">
    <nav class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter uppercase italic">STAT <span class="text-zinc-600">ENGINE</span></h1>
            <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-[0.3em]">Advanced Analytical Module // v4.5</p>
        </div>
        <div class="flex gap-3">
             <button onclick="resetData()" class="px-5 py-2 border border-white/10 rounded-full text-[10px] font-bold uppercase hover:bg-red-900/20">Reset</button>
             <button onclick="exportData()" class="px-5 py-2 bg-white text-black rounded-full text-[10px] font-bold uppercase hover:invert">Export JSON</button>
        </div>
    </nav>

    <div class="row g-4">
        <div class="col-xl-4 col-lg-5">
            <div class="glass-ui p-6">
                <div class="flex gap-2 mb-6">
                    <button onclick="setMode('ungrouped')" id="btnUngrouped" class="flex-1 py-2 bg-white text-black rounded-xl text-[10px] font-black uppercase">Ungrouped</button>
                    <button onclick="setMode('grouped')" id="btnGrouped" class="flex-1 py-2 border border-white/10 rounded-xl text-[10px] font-black uppercase hover:bg-white/5">Grouped</button>
                </div>

                <form id="statForm" class="space-y-4">
                    <div id="ungroupedInput">
                        <label class="text-[10px] uppercase text-zinc-500 mb-1 block">Raw Dataset (Comma Separated)</label>
                        <textarea id="rawValues" class="neo-input w-full h-24 text-xs font-mono" placeholder="12, 15, 15, 17, 20, 22, 25..."></textarea>
                    </div>
                    
                    <div id="groupedInput" class="hidden space-y-3">
                        <label class="text-[10px] uppercase text-zinc-500 mb-1 block">Inject Frequency Table</label>
                        <div class="flex gap-2">
                            <input type="text" id="interval" class="neo-input w-2/3 text-xs" placeholder="Interval (e.g. 10-20)">
                            <input type="number" id="freq" class="neo-input w-1/3 text-xs" placeholder="Freq">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl hover:scale-[1.02] active:scale-95 transition-all uppercase text-xs tracking-widest">
                        Process Distribution
                    </button>
                </form>

                <div class="mt-8 border-t border-white/10 pt-6">
                    <h3 class="text-xs font-bold mb-4 tracking-widest text-zinc-500 uppercase">Analysis Readout</h3>
                    <div class="grid grid-cols-2 gap-3 text-[10px] font-mono">
                        <div class="stat-card">MEAN <span id="resMean" class="block text-lg font-bold">0.00</span></div>
                        <div class="stat-card">MEDIAN <span id="resMedian" class="block text-lg font-bold">0.00</span></div>
                        <div class="stat-card">MODE <span id="resMode" class="block text-lg font-bold">0.00</span></div>
                        <div class="stat-card">S.D. <span id="resSD" class="block text-lg font-bold">0.00</span></div>
                        <div class="stat-card">M.D. <span id="resMD" class="block text-lg font-bold">0.00</span></div>
                        <div class="stat-card">VAR <span id="resVar" class="block text-lg font-bold">0.00</span></div>
                        <div class="stat-card col-span-2">QUARTILES (Q1, Q2, Q3) <span id="resQuart" class="block text-[11px] font-bold mt-1 text-zinc-400">--</span></div>
                        <div class="stat-card col-span-2">DECILE (D5) & PERCENTILE (P50) <span id="resDecPer" class="block text-[11px] font-bold mt-1 text-zinc-400">--</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-8 col-lg-7">
            <div class="flex flex-col gap-4">
                <div class="glass-ui p-6 h-[340px]">
                    <p class="text-[10px] font-mono text-zinc-500 mb-4 uppercase">Frequency Distribution (Bar Chart)</p>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="glass-ui p-6 h-[340px]">
                    <p class="text-[10px] font-mono text-zinc-500 mb-4 uppercase">Density Composition (Pie Chart)</p>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. BACKGROUND ENGINE
    const canvas = document.getElementById('lineCanvas');
    const ctxBg = canvas.getContext('2d');
    let streams = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        streams = Array.from({length: 45}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, w: Math.random()*150+50, s: Math.random()*0.4+0.1 }));
    }
    function animate() {
        ctxBg.clearRect(0,0,canvas.width,canvas.height); ctxBg.strokeStyle='rgba(255,255,255,0.06)';
        streams.forEach(s => { ctxBg.beginPath(); ctxBg.moveTo(s.x, s.y); ctxBg.lineTo(s.x+s.w, s.y); ctxBg.stroke(); s.x+=s.s; if(s.x>canvas.width) s.x=-s.w; });
        requestAnimationFrame(animate);
    }
    init(); animate(); window.onresize=init;

    // 2. CHART SETUP
    const barChart = new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Frequency', backgroundColor: '#fff', borderRadius: 5, data: [] }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: '#444' } }, y: { ticks: { color: '#444' }, grid: { color: 'rgba(255,255,255,0.03)' } } }, plugins: { legend: { display: false } } }
    });
    const pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: { labels: [], datasets: [{ backgroundColor: ['#fff', '#222', '#555', '#999', '#ccc', '#444'], borderWidth: 0, data: [] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#666', font: { size: 10 } } } } }
    });

    // 3. STATISTICAL LOGIC
    let currentMode = 'ungrouped';
    let groupedEntries = [];

    function setMode(m) {
        currentMode = m;
        document.getElementById('ungroupedInput').classList.toggle('hidden', m === 'grouped');
        document.getElementById('groupedInput').classList.toggle('hidden', m === 'ungrouped');
        document.getElementById('btnUngrouped').className = m === 'ungrouped' ? 'flex-1 py-2 bg-white text-black rounded-xl text-[10px] font-black uppercase' : 'flex-1 py-2 border border-white/10 rounded-xl text-[10px] font-black uppercase';
        document.getElementById('btnGrouped').className = m === 'grouped' ? 'flex-1 py-2 bg-white text-black rounded-xl text-[10px] font-black uppercase' : 'flex-1 py-2 border border-white/10 rounded-xl text-[10px] font-black uppercase';
    }

    document.getElementById('statForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if(currentMode === 'ungrouped') {
            const raw = document.getElementById('rawValues').value.split(',').map(Number).filter(n => !isNaN(n)).sort((a,b)=>a-b);
            processUngrouped(raw);
        } else {
            const intv = document.getElementById('interval').value;
            const f = parseInt(document.getElementById('freq').value);
            if(intv && f) {
                groupedEntries.push({ intv, f });
                processGrouped();
            }
        }
    });

    function processUngrouped(arr) {
        const n = arr.length;
        const mean = arr.reduce((a,b)=>a+b)/n;
        const median = n%2===0 ? (arr[n/2-1]+arr[n/2])/2 : arr[Math.floor(n/2)];
        
        // Mode
        const counts = {}; arr.forEach(x => counts[x] = (counts[x]||0)+1);
        const mode = Object.keys(counts).reduce((a,b) => counts[a] > counts[b] ? a : b);

        // SD & MD
        const md = arr.reduce((a,b) => a + Math.abs(b - mean), 0) / n;
        const variance = arr.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / n;
        const sd = Math.sqrt(variance);

        // Percentiles
        const getP = (p) => arr[Math.floor((p/100) * (n-1))];

        updateUI(mean, median, mode, sd, md, variance, `Q1: ${getP(25)} | Q2: ${median} | Q3: ${getP(75)}`, `D5: ${getP(50)} | P50: ${getP(50)}`);
        updateCharts(Object.keys(counts), Object.values(counts));
    }

    function processGrouped() {
        let sumF = 0, sumFX = 0;
        groupedEntries.forEach(e => {
            const bounds = e.intv.split('-').map(Number);
            const mid = (bounds[0]+bounds[1])/2;
            sumF += e.f;
            sumFX += (mid * e.f);
        });
        const mean = sumFX / sumF;
        updateUI(mean, "GROUPED", "MULTI", "--", "--", "--", "See Cumulative", "See Cumulative");
        updateCharts(groupedEntries.map(e => e.intv), groupedEntries.map(e => e.f));
    }

    function updateUI(m, med, mo, sd, md, v, q, dp) {
        document.getElementById('resMean').innerText = Number(m).toFixed(2);
        document.getElementById('resMedian').innerText = med;
        document.getElementById('resMode').innerText = mo;
        document.getElementById('resSD').innerText = Number(sd).toFixed(2);
        document.getElementById('resMD').innerText = Number(md).toFixed(2);
        document.getElementById('resVar').innerText = Number(v).toFixed(2);
        document.getElementById('resQuart').innerText = q;
        document.getElementById('resDecPer').innerText = dp;
    }

    function updateCharts(labels, data) {
        barChart.data.labels = labels; barChart.data.datasets[0].data = data; barChart.update();
        pieChart.data.labels = labels; pieChart.data.datasets[0].data = data; pieChart.update();
    }

    function resetData() {
        groupedEntries = [];
        updateUI(0,0,0,0,0,0,"--","--");
        updateCharts([],[]);
        document.getElementById('rawValues').value = "";
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({mode: currentMode, stats: barChart.data}));
        const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "nova_stats.json"); dl.click();
    }
</script>
</body>
</html>
